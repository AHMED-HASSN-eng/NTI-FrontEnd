<script>
function Student(_fname,_age,_crs,_email){
    this.name=_fname;
    this.age=_age;
    this.crs=_crs;
    this.email=_email;

}
let students=[
    new Student("Ali",20,"CS"),
    new Student("Sara",22,"Math"),
    new Student("Omar",19,"Physics"),
    new Student("Laila",21,"CS"),
    new Student("Hassan",23,"Engineering"),
    new Student("Mona",20,"Biology"),
    new Student("Kareem",24,"Math"),
    new Student("Noor",18,"CS")
]

 document.write(`
 <table border="2" width="90%" >

 `);

students.forEach((elm)=>{

   `
);
});
 document.write(` </table> <br><br>`) ;



function searchByName()
{
    document.write(`

    <h4>2-find and Search for a student by name and print their details.</h4>

     <form action="">
        <input type="text" name="name" size="40px"><br><br>
        <button type="submit">Search</button>
    </form>
    `);
  _name=location.href.split("?")[1].split("&")[0].split("=")[1];
  document.write(`
      <table border="2" width="90%" >
       <tr >
        <th colspan="3">1- Display all students</th>
       </tr>
       <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Course</th>
       </tr>`);
    students.filter((elm)=>{
        if(elm.name===_name)
    {
      document.write(`
       <tr>
        <td> ${elm.name}</td>
        <td> ${elm.age}</td>
        <td>${elm.crs}</td>
       </tr>
      `);
    }
       
    })
    
    document.write(` </table> <br><br>`) ;
}

searchByName();

document.write(`
<h4>3-Find how many students are in the array(count Students).</h4>

 <h4>The Number Of Students Is       <font color="green" >${students.length}</font>  </h4>
`);
}

function sortByAge()
{

    <h4>6- Sort Students by age</h4>

    `);

      <table border="2" width="90%" >
       <tr >
        <th colspan="3">6- Sort Students by age</th>
       </tr>
       <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Course</th>
       </tr>`);
     _sortArr= students.sort((a,b)=>{

function arrOnlyName()
{

    <h4>7-Create a new array with only student names.</h4>

    `);

   
    _newArr=new Array();

        _newArr.push(elm.name);

}
arrOnlyName();


function aboveAge()
{
    document.write(`

    <h4>8-Check if all students are above age  18 and return true or false </h4>

    `);

   
    flg=true;
    students.map((elm)=> 
    {
       if(elm.age<=18)
       flg=false;
    });
    
   
    document.write(`
     <h4> <font color="green" >${flg}</font>  </h4>

    `);
   
    
   
}
aboveAge();


function sameCrs()
{
    document.write(`

    <h4>9-return Students Who Have the Same Crs</h4>

    `);

     _crs=new Array();

    students.forEach((elm)=>{
        let found = _crs.find(item => item[0] === elm.crs);

            if (found) {
                found[1]++;
            } else {
                _crs.push([elm.crs, 1]);
            }

    });

    

    
    document.write(`
      <table border="2" width="90%" >
       <tr >
        <th colspan="3">9-return Students Who Have the Same Crs</th>
       </tr>
       <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Course</th>
       </tr>`);
     
    
    _crs.forEach((_crselm)=> 
    {
      cnt=0;
      students.forEach((elm)=>{
        
        if(elm.crs===_crselm[0])
      {
        cnt++;

                if(cnt===1)
                {
                    document.write(`
                        <tr>
                            <td> ${elm.name}</td>
                            <td> ${elm.age}</td>
                            
                            <td rowspan="${_crselm[1]}"> ${elm.crs  } </td>
                        </tr>
                    `);
                }
                else
                {
                    document.write(`
                        <tr>
                            <td> ${elm.name}</td>
                            <td> ${elm.age}</td>
                            
                        </tr>
                    `);
                }
    }

       
      })
     
    
    });
    
    
    document.write(` </table> <br><br>`) ;
    
   
}
sameCrs();



function avgAge()
{
    document.write(`

    <h4>10-Calculate the average age of all students.</h4>

    `);

   

     
    
     _sum=0;
      students.forEach((elm)=>{
        
     _sum+=  elm.age;
       
      })
     
  
     document.write(`
     <h4> <font color="green" >${ _sum/students.length}</font>  </h4>

    `);
   
}
avgAge();



function sortByAgeDesc()
{
    document.write(`

    <h4>11-Sort and Find top 3 oldest students</h4>

    `);
  document.write(`
      <table border="2" width="90%" >
       <tr >
        <th colspan="3">11-Sort and Find top 3 oldest students</th>
       </tr>
       <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Course</th>
       </tr>`);
     _sortArr= students.sort((a,b)=>{
        if(a.age<b.age)
        return 1;
        else if(a.age>b.age)
        return -1;
        else
        return 0;
    });
    cnt=0;
    _sortArr.forEach((elm)=> 
    {
      cnt++;
      if(cnt<=3)
      {
      document.write(`
       <tr>
        <td> ${elm.name}</td>
        <td> ${elm.age}</td>
        <td>${elm.crs}</td>
       </tr>
      `);
      }
      
    
    });
    
    
    document.write(` </table> <br><br>`) ;
}
sortByAgeDesc();





function sameName()
{
    document.write(`

    <h4>12-Find if there are students with the same name.</h4>

    `);

   
    flg=false;
     for(i=0;i<students.length;i++)
     {
        for(j=i+1;j<students.length;j++)
        {
            if(students[i].name==students[j].name)
            flg=true;
        }
     }
    
   
    document.write(`
     <h4> <font color="green" >${flg}</font>  </h4>

    `);
   
    
   
}
sameName();



function reverse()
{
    document.write(`

    <h4>13-Reverse the array without using .reverse().</h4>

    `);
  document.write(`
      <table border="2" width="90%" >
       <tr >
        <th colspan="3">13-Reverse the array without using .reverse().</th>
       </tr>
       <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Course</th>
       </tr>`);
     _revArr= new Array();
       for(i=students.length-1;i>=0;i--)
       {
        _revArr.push(students[i]);
       }

    _revArr.forEach((elm)=> 
    {
      
      document.write(`
       <tr>
        <td> ${elm.name}</td>
        <td> ${elm.age}</td>
        <td>${elm.crs}</td>
       </tr>
      `);
      
      
    
    });
    
    
    document.write(` </table> <br><br>`) ;
}
reverse();


function newFormat()
{

}
