<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<script>
    let str="welcome to js";
    counter=0;
    
   let timerId= setInterval(()=>{
        document.write(str[counter++]);
    },1000);

    setTimeout(()=>{
     clearInterval(timerId);
    window.close();
    },(str.length*1000)+500);
</script>

</body>
</html>
