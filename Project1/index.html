<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./CSS/index.css">
    <script type="module" src="./Modules/exam.js"></script>
</head>
<body>
    <nav class="nav-bar">
          <div>
            <h2>NTI Exam System</h2>
          </div>
          <div>
            <ul>
                <li><a href="">Exams</a></li>
            </ul>
          </div>
    </nav>
    <div class="contant" id="contant-id">

        <div class="btns-div" id="btns-id">
            <div class="btn-st-div" id="btn-st-div-id">
                <button type="button" class="btn-init btn-st start-test" id="btn-st-id">Start Exam</button>
            </div>
            <div class="btn-add-div" id="bt-add-div-id">
                <button type="button" class="btn-init btn-add"id="btn-add-id" >Add New Question</button>
            </div>
        </div>

        <div class="add-new-ques " id="add-new-ques-id">
            <h2>New Question</h2>
            <form action="" class="frm-new-ques">
                <select name="question" id="selc-question-id" >
                    <option value="" disabled selected hidden>Choose Question Type</option>
                    <option value="trfls">True/False Question</option>
                    <option value="short">Short Answer Question</option>
                </select>
                <input placeholder="Enter Your Question" type="text" class="inp-ques" id="typ-question-id">
                 <select name="answer-tf-type" id="selc-answer-id" class="selc-answer-id">
                    <option value="" disabled selected hidden>Choose Correct Answer</option>
                    <option value="True">True</option>
                    <option value="False">False</option>
                </select>
                <input placeholder="Enter Your Correct Answer" type="text" class="inp-ques typ-correct-ans-id" id="typ-correct-ans-id">
                <input placeholder="Enter Grade For Question" type="number" class="inp-grad" id="typ-grade-id">
                <button type="button" id="btn-submit-id">Submit</button>
            </form>
        </div>
        <div class="questionscards" id="questionscards-id">
        </div>

        <div class="resultofanswers" id="resultofanswers-id">
                <div class="header-answer">
                   <h2 style="color: green;">Thank You For Your Time</h2>
                   <h2 id="h2-grade"></h2>
                </div>
                <div class="allquesandanswers" id="allquesandanswers-id">
                    
                </div>
                <div class="div-btn-restart" id="btn-restart-id">
                    <button class="btn-restart start-test">Restart The Test</button>
                </div>
        </div>
   
        <div class="btn-next-prev" id="btn-next-prev-id">
            <button class="btn-prev" id="btn-prev-id">Previous</button>
            <button class="btn-next" id="btn-next-id">Next Question</button>
        </div>
        
    </div>
</body>
</html>
