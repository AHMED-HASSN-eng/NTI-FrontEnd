class Rectangel extends Shape{
    constructor(_height,_width){
        super();
        this.height=_height;
        this.width=_width;
    }
    calcArea(){
        return this.height*this.width;
    }
}
class Circle extends Shape{
    constructor(_reduies){
         super();
        this.reduies=_reduies;
    }
    calcArea(){
        return (this.reduies/2)*(this.reduies/2)*3.14;
    }
}
