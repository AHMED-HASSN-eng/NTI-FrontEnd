<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
  body{
    margin: 0px;
   }
   .nav-bar{
    position: fixed;
    display: flex ;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    height: 80px;
    z-index: 100;
    background-color: white;
    text-align: center;
    color: #802c6e;
    font-weight: bold;
    font-size: 1.8rem;
    font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
   }
   .nav-bar div{
    width: 50%;
   }
   .nav-bar ul{
    list-style-type: none;
    width: 100%;
    display: flex;
    font-size: 1.2rem;
    justify-content: flex-end;
    margin: 0;
    padding: 0;
   }
   .nav-bar ul a{
    text-decoration: none;
    color: #802c6e;
    display: block;
    padding: 10px 20px;
   }
   .nav-bar li:hover{
    background-color: #802c6e;
   
   }
   .nav-bar li:hover a{
    color: white;
   }
   .nav-bar h3{
    margin-left: 15px;
   
   }
    .products{
        position: relative;
        top: 130px;
        display: grid;
        grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
        flex: 1;
        gap: 20px;
        border-radius: 10px; 
        margin:0px 20px 20px 20px;
        
    }
    .item{
        width: 300px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        border-radius: 10px;
        box-shadow:  0 1px 2px rgba(0,0,0,0.05),
                     0 4px 8px rgba(0,0,0,0.05),
                     0 12px 24px rgba(0,0,0,0.05);

    }
    .div-img{
         width: 100%;
         height: 300px;
         background-color: #ffff;
         border-radius: 10px;
    }
    .div-cont{
        width: 100%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
    }
    .item-img{
        width: 100%;
        height: 100%;
        border-radius: 5px;
        object-fit: contain;
        border: 2px solid #802c6e;
    }
   
    .item-title{
         color: #802c6e;
         font-size: 1.3rem;
         font-weight: bold;
         text-align: center;
        
     
    }
    .item-price{
        font-size: 1rem;
        font-weight: bold;
        color: #802c6e;
    }
    .pric-rate{
        width: 90%;
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
    }
    .btn-add{
         margin: 0px 0px 10px 0px;
         width: 90%;
         height: 40px;
         border-radius: 30px;
         /* background-color: #333333; */
         border: #802c6e;
         color: white;
         background: linear-gradient(90deg, #802c6e, #5f1f52);
    }
    .div-cont button:hover{
       
         background-color: linear-gradient(90deg, #99568b, #802c6e);
         border: #99568b;
         color: #ffff;
         cursor: pointer;
    }
    .div-cont button:active{
        transform: scale(0.95);
    }
    .quntity{
        width: 30%;
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        color: #802c6e;
    }
    .qunt{
        display: inline-block;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: 1.2px solid #802c6e;
        text-align: center;
    }
    .quntity span:hover{
      background-color: #802c6e;
      color: white;
      cursor: pointer;
      
    }
    .quntity span:active{
        transform: scale(0.95);
    }
    
  
</style>
<script src="./main.js" type="module"></script>
<body>
    
        <nav class="nav-bar shadow">
        <h3>FAKE STORE</h3>
        <div>
            <ul>
                <li><a href="./products.html">HOME</a></li>
                <li><a href="./bagCart.html">BAGCART</a></li>
            </ul>
        </div>
    </nav>
        <div class=" products" id="productsid">
            
        </div>
            
        </div>

  
</body>
</html>
